<!-- FIXED TOP NAV -->

    <nav class="menu">

  <body>

    <div class="services-container">
        <h2 class="services slide-right">Mixing</h2>
        <h2 class="services slide-left">Mastering</h2>
        <h2 class="services slide-right">Branding</h2>
        <h2 class="services slide-left">Distribution</h2>
        <h2 class="services slide-right">Podcast Production</h2>
        <h2 class="services slide-left">Talent Development</h2>
    </div>

<script>      
    const animatedText = document.querySelectorAll('.slide-left, .slide-right');
    const observer = new IntersectionObserver((entries) => {
     entries.forEach((entry) => {
      if (entry.isIntersecting) {
      entry.target.classList.add('active');
     }
    });
    }, {
        threshold: 0.1
       });
     animatedText.forEach((element) => {
     observer.observe(element);
     });            
  </script>

</body>

</html>
