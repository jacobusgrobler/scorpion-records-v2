<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scorpion Records</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Tint&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="images/logo-name-square.jpeg">
</head>


<body>

  <!-- FIXED TOP NAV -->
  <header class="top-bar">
    <div class="logo"> <img src="/images/logo-name-square.jpeg" alt="logo image"> 
      <h1>Scorpion Records</h1>
    </div>

    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="contact.html">Contact</a>
      <a href="services.html">Services and Music</a>
    </nav>
  </header>

  <!-- MAIN SPLIT LAYOUT -->
  <main class="split-layout">

    <!-- LEFT SECTION -->
    <section class="left-panel">

      <div class="left-overlay"></div>

      <div class="left-content"></div>

    </section>

    <!-- RIGHT SECTION -->
    <section class="right-panel">

      <div class="scroll-item" id="video-link">
        <a href="video/background-vid-studio.mp4">
          <video autoplay muted loop playsinline>
            <source src="video/background-vid-studio.mp4" type="video/mp4">
          </video>
        </a>
      </div>

      <div class="scroll-item">
        <img src="images/blond-girl-singing.jpg" alt="">
      </div>
      
      <div class="scroll-item">
        <img src="images/blond-girl-taller-guy-singing.jpg" alt="people on stage acting and singing">
      </div>

      <div class="scroll-item">
        <img src="images/presenter-with-all-the-ladies.jpg" alt="people on stage acting and singing">
      </div>

      <div class="scroll-item">
        <img src="images/whole-gang-on-stage-close-up-looking-left.jpg" alt="people on stage acting and singing">
      </div>

      <div class="scroll-item">
        <img src="images/presenter-on-stage.jpg" alt="people on stage acting and singing">
      </div>

      <div class="scroll-item">
        <img src="images/short-guy-singing.jpg" alt="people on stage acting and singing">
      </div>

      <div class="scroll-item">
        <img src="images/tall-guy-short-guy-blond-girl-singing-action.jpg" alt="people on stage acting and singing">
      </div>

    </section>

  </main>

</body>
    <script>
            
      const animatedText = document.querySelectorAll('.slide-left, .slide-right');
      const observer = new IntersectionObserver((entries) => {
       entries.forEach((entry) => {
        if (entry.isIntersecting) {
        entry.target.classList.add('active');
       }
      });
      }, {
          threshold: 0.1
         });
       animatedText.forEach((element) => {
       observer.observe(element);
       });
              
    </script>
</html>
